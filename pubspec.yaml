version: 1.0.2

issue_tracker: https://github.com/Gorniaky/dart_morse_codec/issues
repository: https://github.com/Gorniaky/dart_morse_codec

topics:
  - codec
  - convert
  - decoder
  - encoder
  - morse

environment:
  sdk: ^3.12.0

dev_dependencies:
  args: ^2.7.0
  lints: ^6.1.0
  pub_semver: ^2.2.0
  test: ^1.31.1
